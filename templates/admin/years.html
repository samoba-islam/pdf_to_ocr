{% extends "admin/base.html" %}

{% block title %}Years List{% endblock %}

{% block content %}
<div class="table-container">
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Year</th>
            </tr>
        </thead>
        <tbody>
            {% for year in years %}
            <tr>
                <td>{{ year.id }}</td>
                <td>{{ year.year }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="2" class="text-center">No years found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
