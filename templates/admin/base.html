<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - MCQ OCR</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --sidebar-width: 250px;
            --primary-color: #4F46E5;
            --secondary-color: #818CF8;
        }

        body {
            background-color: #f8f9fa;
        }

        #sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            background: #1e1b4b;
            color: white;
            padding-top: 1rem;
            transition: all 0.3s;
        }

        #sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 0;
        }

        #sidebar .nav-link:hover, #sidebar .nav-link.active {
            color: white;
            background: rgba(255, 255, 255, 0.1);
            border-left: 4px solid var(--secondary-color);
        }

        #sidebar .nav-link i {
            width: 20px;
            text-align: center;
        }

        #content {
            margin-left: var(--sidebar-width);
            padding: 2rem;
        }

        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .table-container {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .img-preview {
            max-width: 150px;
            max-height: 100px;
            border-radius: 4px;
            cursor: pointer;
        }

        .badge-answer {
            background-color: #10B981;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <div id="sidebar">
        <div class="px-4 mb-4">
            <h4 class="fw-bold"><i class="fas fa-shield-alt me-2"></i>Admin Panel</h4>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link {% if request.path == '/admin' %}active{% endif %}" href="/admin">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a class="nav-link {% if request.path == '/admin/exam_questions' %}active{% endif %}" href="/admin/exam_questions">
                <i class="fas fa-file-invoice"></i> Exam Questions
            </a>
            <a class="nav-link {% if request.path == '/admin/mcqs' %}active{% endif %}" href="/admin/mcqs">
                <i class="fas fa-list-ol"></i> MCQs
            </a>
            <a class="nav-link {% if request.path == '/admin/exams' %}active{% endif %}" href="/admin/exams">
                <i class="fas fa-graduation-cap"></i> Exams
            </a>
            <a class="nav-link {% if request.path == '/admin/years' %}active{% endif %}" href="/admin/years">
                <i class="fas fa-calendar-alt"></i> Years
            </a>
            <a class="nav-link {% if request.path == '/admin/questions' %}active{% endif %}" href="/admin/questions">
                <i class="fas fa-question-circle"></i> Questions
            </a>
            <a class="nav-link {% if request.path == '/admin/options' %}active{% endif %}" href="/admin/options">
                <i class="fas fa-check-square"></i> Options
            </a>
            <hr class="mx-3 my-2 text-white-50">
            <a class="nav-link" href="/">
                <i class="fas fa-arrow-left"></i> Back to OCR
            </a>
        </nav>
    </div>

    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>{% block title %}{% endblock %}</h2>
        </div>

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
