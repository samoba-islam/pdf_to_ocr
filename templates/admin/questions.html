{% extends "admin/base.html" %}

{% block title %}Questions List{% endblock %}

{% block content %}
<div class="table-container">
    <table class="table table-hover">
        <thead class="table-light">
            <tr>
                <th>ID</th>
                <th>Question Text</th>
            </tr>
        </thead>
        <tbody>
            {% for q in questions %}
            <tr>
                <td>{{ q.id }}</td>
                <td>{{ q.text }}</td>
            </tr>
            {% else %}
            <tr>
                <td colspan="2" class="text-center">No questions found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
